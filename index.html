<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Router</title>
  <script>
    (function(){
      // Se siamo già su Index2 o Index3 non fare nulla
      const p = location.pathname.toLowerCase();
      if (p.endsWith('/index2.html') || p.endsWith('/index3.html') || p.endsWith('/index.html')) {
        return;
      }

      // Legge risultato da localStorage (preferibile) o da query string
      const params = new URLSearchParams(location.search);
      const result = params.get('result') || localStorage.getItem('gameResult');

      if (result === 'win') {
        location.replace('/Index3.html');
      } else if (result === 'lose') {
        location.replace('/Index2.html');
      } else {
        // fallback: mostra una pagina di scelta o reindirizza a Index2
        location.replace('/Index2.html');
      }
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
