<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Router</title>
  <script>
    const params = new URLSearchParams(location.search);
    const result = params.get('result'); // ?result=win oppure ?result=lose
    if (result === 'win') {
      location.replace('/Index3.html');
    } else if (result === 'lose') {
      location.replace('/Index2.html');
    } else {
      // default: mostra una pagina di scelta o redirect a Index2
      location.replace('/Index2.html');
    }
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
